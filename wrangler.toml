# Cloudflare Pages configuration for reporta.app
# Reference: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "reportaweb3"
type = "javascript"
account_id = "e8ccb5b6899509f1f9fdffa5cad4e615"
workers_dev = false

# Build command for Next.js
build = { command = "npm run build" }

# Directories
main = "out/_worker.js"
site = { include = "out/static" }

# Environment: staging (web.reportar.app)
[env.staging]
name = "reportaweb3-staging"
route = "web.reportar.app/*"
zone_name = "reportar.app"

vars = {
  ENVIRONMENT = "staging",
  NEXT_PUBLIC_SUPABASE_URL = "https://fqwhagryqkkhbgznxtwf.supabase.co"
}

[env.staging.triggers.crons]
# Optional: cron job for database cleanup (if needed)
# "0 2 * * *" = daily at 2 AM UTC

# Environment: demo (demo.reportar.app)
[env.demo]
name = "reportaweb3-demo"
route = "demo.reportar.app/*"
zone_name = "reportar.app"

vars = {
  ENVIRONMENT = "demo",
  NEXT_PUBLIC_SUPABASE_URL = "https://fqwhagryqkkhbgznxtwf.supabase.co"
}

# Environment: production (live.reportar.app)
[env.production]
name = "reportaweb3-production"
route = "live.reportar.app/*"
zone_name = "reportar.app"

vars = {
  ENVIRONMENT = "production",
  NEXT_PUBLIC_SUPABASE_URL = "https://fqwhagryqkkhbgznxtwf.supabase.co"
}

# Secrets (keep sensitive data separate, not in wrangler.toml)
# Use: wrangler secret put SUPABASE_SERVICE_ROLE_KEY --env production
# [env.production.secrets]
# SUPABASE_SERVICE_ROLE_KEY
# RESEND_API_KEY

# Optional: Rate limiting (Cloudflare Pro feature)
[env.production.routes]
pattern = "live.reportar.app/*"
zone_name = "reportar.app"
custom_domain = true
