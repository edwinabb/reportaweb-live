# Cloudflare Workers configuration for reporta.app (Next.js via OpenNext)
# Docs: https://opennext.js.org/cloudflare
#
# Build:  npx opennextjs-cloudflare build
# Deploy: npx wrangler deploy --name <worker-name>
#   demo → npx wrangler deploy --name reportaweb3-demo
#   live → npx wrangler deploy --name reportaweb3-live

name = "reportaweb-live"
main = ".open-next/worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
# Minifica el bundle al deployar — el build remoto genera un handler ~7x más
# grande que el local; sin esto excede el límite de tamaño de Workers.
minify = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Runtime environment variables (non-sensitive).
# Sensitive values (SUPABASE_SERVICE_ROLE_KEY, RESEND_API_KEY, CRON_SECRET)
# must be set as Secrets in the Cloudflare dashboard:
# Worker → Settings → Variables and Secrets
[vars]
